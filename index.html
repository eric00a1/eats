.content {

}

}

.shop-img img {

  height: 100%;

  display: block;
}

.shop-body {
  flex: 1;

}

.shop-name {

.meta {

  font-size: 12px;

}

.pill {
  background: #f1f5f9;

  padding: 4px 8px;
}

.button-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
}

button {
  border: none;
  padding: 10px;
  border-radius: 13px;
  font-weight: bold;
  cursor: pointer;
}

.menu-btn {
  background: #111827;
  color: white;
}

.map-btn {
  background: #dbeafe;
  color: #075985;
}

.nav-btn {

  background: #e0f2fe;
  color: #0369a1;
}

.empty {
  text-align: center;
  color: #64748b;
  padding: 40px 0;
}

.modal-bg {
  display: none;
  position: fixed;

  background: rgba(0,0,0,0.5);

  align-items: flex-end;
  padding: 18px;

  padding: 20px;
  border-radius: 26px;

  justify-content: space-between;
  background: #f8fafc;
  border-radius: 14px;
  padding: 12px;
  margin-bottom: 8px;

  bottom: 14px;

  color: #94a3b8;

.nav-item div {

.nav-item.active {

const categories = ["全部", ...new Set(shops.map(shop => shop.category))];

let currentCategory = "全部";

const shopList = document.getElementById("shopList");
const searchInput = document.getElementById("searchInput");
const categoryBar = document.getElementById("categoryBar");
const shopCount = document.getElementById("shopCount");
const mapFrame = document.getElementById("mapFrame");
const mapTitle = document.getElementById("mapTitle");

function renderCategories() {
  categoryBar.innerHTML = "";

  categories.forEach(category => {
    const btn = document.createElement("button");
    btn.className = "category-btn" + (category === currentCategory ? " active" : "");
    btn.textContent = category;
    btn.onclick = () => {
      currentCategory = category;
      renderCategories();
      renderShops();
    };
    categoryBar.appendChild(btn);
  });
}

function showOnMap(index) {
  const shop = shops[index];
  const offset = 0.003;

  const bbox = `${shop.lng - offset}%2C${shop.lat - offset}%2C${shop.lng + offset}%2C${shop.lat + offset}`;

  mapFrame.src = `https://www.openstreetmap.org/export/embed.html?bbox=${bbox}&layer=mapnik&marker=${shop.lat}%2C${shop.lng}`;

  mapTitle.textContent = shop.name + " 的位置";

  window.scrollTo({ top: 0, behavior: "smooth" });
}

function openGoogleMap(index) {
  const shop = shops[index];
  const url = `https://www.google.com/maps/search/?api=1&query=${shop.lat},${shop.lng}`;
  window.open(url, "_blank");
}

function renderShops() {
  const keyword = searchInput.value.trim();

  const filtered = shops.filter(shop => {
    const text = shop.name + shop.category + shop.menu.map(m => m.item).join("");
    const categoryMatch = currentCategory === "全部" || shop.category === currentCategory;
    const keywordMatch = text.includes(keyword);
    return categoryMatch && keywordMatch;
  });

  shopCount.textContent = filtered.length + " 間";
  shopList.innerHTML = "";

  if (filtered.length === 0) {
    shopList.innerHTML = '<div class="empty">找不到符合的店家</div>';
    return;
  }

  filtered.forEach(shop => {
    const originalIndex = shops.indexOf(shop);

    const card = document.createElement("div");
    card.className = "shop-card";

    card.innerHTML = `
      <div class="shop-img">
        <img src="${shop.img}" alt="${shop.name}">
      </div>

      <div class="shop-body">
        <div class="shop-name">${shop.name}</div>

        <div class="meta">
          <span class="pill">${shop.category}</span>
          <span class="pill">📍 ${shop.distance}m</span>
          <span class="pill">🚶 ${shop.time}</span>
          <span class="pill">⭐ ${shop.rating}</span>
        </div>

        <div class="button-row">
          <button class="menu-btn" onclick="openMenu(${originalIndex})">菜單</button>
          <button class="map-btn" onclick="showOnMap(${originalIndex})">看地圖</button>
        </div>

        <button class="nav-btn" onclick="openGoogleMap(${originalIndex})">開 Google Maps 導航</button>
      </div>
    `;

    shopList.appendChild(card);
  });
}

function openMenu(index) {
  const shop = shops[index];

  document.getElementById("modalTitle").innerText = shop.name;

  document.getElementById("menuList").innerHTML = shop.menu.map(m => `
    <div class="menu-item">
      <span>${m.item}</span>
      <strong>$${m.price}</strong>
    </div>
  `).join("");

  document.getElementById("modalBg").style.display = "flex";
}

function closeMenu() {
  document.getElementById("modalBg").style.display = "none";
}

searchInput.addEventListener("input", renderShops);

renderCategories();
renderShops();
</script>
