.modal-bg{

.modal{

.menu-item{

const shopList = document.getElementById("shopList");

function renderShops(){

const keyword = document.getElementById("searchInput").value;

shopList.innerHTML = "";

const filtered = shops.filter(shop =>
shop.name.includes(keyword)
);

filtered.forEach((shop,index)=>{

const card = document.createElement("div");

card.className = "shop-card";

card.innerHTML = `
<div class="shop-img">
<img src="${shop.img}">
</div>

<div class="shop-body">

<div class="shop-name">${shop.name}</div>

<div class="meta">
${shop.category} ・ 📍${shop.distance}m ・ ⭐${shop.rating}
</div>

<div class="button-row">

<button class="menu-btn" onclick="openMenu(${index})">
菜單
</button>

<button class="map-btn"
onclick="window.open('https://www.google.com/maps/search/?api=1&query='+shop.lat+','+shop.lng)">
地圖
</button>

</div>

</div>
`;

shopList.appendChild(card);

});

}

function openMenu(index){

const shop = shops[index];

document.getElementById("modalTitle").innerText = shop.name;

document.getElementById("menuList").innerHTML =
shop.menu.map(m =>
`<div class="menu-item">
<span>${m.item}</span>
<span>$${m.price}</span>
</div>`
).join("");

document.getElementById("modalBg").style.display = "flex";

}

function closeMenu(){
document.getElementById("modalBg").style.display = "none";
}

document.getElementById("searchInput")
.addEventListener("input",renderShops);

renderShops();
